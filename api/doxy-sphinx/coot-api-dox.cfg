
PROJECT_NAME           = "libcootapi"

# @-tokens are expanded by CMake's configure_file(... @ONLY) into <build>/Doxyfile.
# The XML is written to <build>/doxygen/xml/ (doxygen appends the "xml" subdir),
# where the embedded-docstring generator (coot-make-docstrings) reads it from.
# The source-code build only needs the XML - not sphinx/breathe/HTML - so this
# stays entirely in the build tree.
OUTPUT_DIRECTORY       = @CMAKE_CURRENT_BINARY_DIR@/doxygen

# and sfcalc_genmap_stats_t, moved_residue_t and moved_atom_t need docs.
INPUT = @CMAKE_CURRENT_SOURCE_DIR@/api/molecules-container.hh   @CMAKE_CURRENT_SOURCE_DIR@/api/coot-molecule.hh     @CMAKE_CURRENT_SOURCE_DIR@/coot-utils/simple-mesh.hh \
        @CMAKE_CURRENT_SOURCE_DIR@/api/instancing.hh            @CMAKE_CURRENT_SOURCE_DIR@/api/superpose-results.hh @CMAKE_CURRENT_SOURCE_DIR@/api/validation-information.hh \
        @CMAKE_CURRENT_SOURCE_DIR@/coot-utils/vertex.hh         @CMAKE_CURRENT_SOURCE_DIR@/geometry/residue-and-atom-specs.hh \
        @CMAKE_CURRENT_SOURCE_DIR@/coot-utils/sfcalc-genmap.hh  @CMAKE_CURRENT_SOURCE_DIR@/coot-utils/coot-density-stats.hh \
        @CMAKE_CURRENT_SOURCE_DIR@/coot-utils/coot-map-utils.hh @CMAKE_CURRENT_SOURCE_DIR@/coords/mmdb-crystal.hh   @CMAKE_CURRENT_SOURCE_DIR@/coords/Cartesian.hh \
        @CMAKE_CURRENT_SOURCE_DIR@/api/generic-3d-lines.hh      @CMAKE_CURRENT_SOURCE_DIR@/analysis/stats.hh        @CMAKE_CURRENT_SOURCE_DIR@/api/moorhen-h-bonds.hh \
        @CMAKE_CURRENT_SOURCE_DIR@/api/coot-colour.hh           @CMAKE_CURRENT_SOURCE_DIR@/api/api-cell.hh          @CMAKE_CURRENT_SOURCE_DIR@/coot-utils/g_triangle.hh \
        @CMAKE_CURRENT_SOURCE_DIR@/api/residue-validation-information.hh

GENERATE_XML = YES

# Only the XML is consumed; skip HTML/LaTeX (would otherwise be written into the
# source tree at the OUTPUT_DIRECTORY above).
GENERATE_HTML = NO
GENERATE_LATEX = NO

ENABLE_PREPROCESSING = YES

# use this in the code to skip over parts of the API that are not for exporting

# Make a new version of this doxy config file that specifies SKIP_FOR_PYTHON_DOXYGEN=TRUE
# atom_cid_to_atom_spec
# PREDEFINED = DOXYGEN_SHOULD_PARSE_THIS SWIG=TRUE
PREDEFINED = DOXYGEN_SHOULD_PARSE_THIS=TRUE SKIP_FOR_PYTHON_DOXYGEN=TRUE NB_VERSION_MAJOR=1 MAKE_ENHANCED_LIGAND_TOOLS=1
