# Build Coot via the coot_zerokara build script (dl_and_build_coot.sh): it builds the
# whole dependency stack + Coot into one relocatable prefix. Phases 1-3 (the dependency
# stack) are cached per build type; a cache hit jumps straight to the Coot phase. Release
# and debug run in parallel. We build the checked-out commit, not a clone — see the
# "-branch" step below for how the source is fed to the script.

name: Coot CI (coot_zerokara build script)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-coot-zerokara:

    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[ci skip]') }}
    runs-on: ubuntu-latest
    container:
      image: rockylinux/rockylinux:9
    # A full from-scratch dependency build is long; a cache hit is much faster.
    timeout-minutes: 600

    strategy:
      fail-fast: false
      matrix:
        include:
          - build_type: release
            label: release
            flag: ""
          - build_type: debug
            label: debug
            flag: "-debug"

    env:
      # Where everything lands. PREFIX = $(pwd) of the script, so we run it from here.
      BUILD_DIR: ${{ github.workspace }}/coot-build

    steps:
      - name: Install prerequisites (RockyLinux minimal lacks these)
        run: |
          dnf -y install --setopt=tsflags=nodocs git zstd which wget
          df -h /

      - name: Derive the Coot source dir name from the ref
        id: coot
        # The script computes COOT_DIR = coot-<branch> with `/`->`-` and ` `->`_`; mirror
        # that exactly so download_coot finds (and reuses) the source we check out.
        run: |
          ref='${{ github.ref_name }}'
          dir="coot-$(printf '%s' "$ref" | sed 's/ /_/g; s%/%-%g')"
          echo "dir=$dir" >> "$GITHUB_OUTPUT"
          echo "Coot source dir: $dir"

      - name: Checkout Coot (source under test)
        uses: actions/checkout@v6
        with:
          path: coot-build/${{ steps.coot.outputs.dir }}

      - name: Checkout the coot_zerokara build script
        uses: actions/checkout@v6
        with:
          repository: hgonomeg/coot_zerokara
          ref: main
          path: build-script

      # Split restore/save so deps are cached right after they build, before the Coot phase + tests.
      - name: Restore cached dependency stack
        id: cache-deps
        uses: actions/cache/restore@v5
        with:
          # Only the install tree is cached, never the deps/ source trees or build/ dirs
          # (those are huge and not needed to build Coot). A cache hit means the whole
          # dependency stack is already present in the prefix.
          #
          # Exception: the Coot phase's extract_fonts untars the bundled fonts straight
          # from deps/fonts/, so that one small dir must survive into a cache-hit run
          # (where deps/ otherwise wouldn't exist at all). Cache just it.
          path: &deps_paths |
            coot-build/bin
            coot-build/sbin
            coot-build/lib
            coot-build/lib64
            coot-build/libexec
            coot-build/include
            coot-build/share
            coot-build/etc
            coot-build/var
            coot-build/.cargo
            coot-build/.rustup
            coot-build/deps/fonts
          # The dependency stack is fully determined by the script's pinned versions and
          # the build type, so key on both. Bump the vN salt to force a rebuild.
          key: coot-deps-rockylinux-${{ matrix.build_type }}-v1-${{ hashFiles('build-script/dl_and_build_coot.sh') }}

      # ---- Phases 1-3: build the dependency stack (only on a cache miss) ----------------

      - name: Phase 1 - download sources
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ${{ env.BUILD_DIR }}
        run: bash "$GITHUB_WORKSPACE/build-script/dl_and_build_coot.sh"
             -use-os-package-manager -distributable -noninteractive ${{ matrix.flag }} -download-only

      - name: Phase 2 - build toolchain
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ${{ env.BUILD_DIR }}
        run: bash "$GITHUB_WORKSPACE/build-script/dl_and_build_coot.sh"
             -no-use-os-package-manager -distributable -noninteractive ${{ matrix.flag }} -toolchain-only

      - name: Phase 3 - build dependencies
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ${{ env.BUILD_DIR }}
        run: bash "$GITHUB_WORKSPACE/build-script/dl_and_build_coot.sh"
             -no-use-os-package-manager -distributable -noninteractive ${{ matrix.flag }} -deps-only

      # The unpacked sources (deps/) and out-of-tree build dirs (build/) are the bulk of
      # the disk usage and are not needed for the Coot phase. Drop them so the runner does
      # not run out of disk — but keep deps/fonts/, which the Coot phase's extract_fonts
      # untars (and which is the only part of deps/ we cache).
      - name: Reclaim disk space (drop dependency sources & build trees, keep fonts)
        if: steps.cache-deps.outputs.cache-hit != 'true'
        working-directory: ${{ env.BUILD_DIR }}
        run: |
          df -h .
          find deps -mindepth 1 -maxdepth 1 ! -name fonts -exec rm -rf {} +
          rm -rf build
          df -h .

      # Persist the freshly-built deps now (before the Coot phase + tests), so a later
      # failure or timeout never discards them.
      - name: Save dependency stack to cache
        if: steps.cache-deps.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: *deps_paths
          key: ${{ steps.cache-deps.outputs.cache-primary-key }}

      # On a cache hit we never installed the OS packages (compilers, X libs, etc.) that
      # phase 1 normally installs, so the Coot phase must install them itself. On a cache
      # miss phase 1 already did, so skip it there.
      - name: Determine OS-package flag for the Coot phase
        id: pkgflag
        run: |
          if [ "${{ steps.cache-deps.outputs.cache-hit }}" = "true" ]; then
            echo "flag=-use-os-package-manager" >> "$GITHUB_OUTPUT"
          else
            echo "flag=-no-use-os-package-manager" >> "$GITHUB_OUTPUT"
          fi

      # ---- Phase 4: build the checked-out Coot against the (cached) dependency stack -----

      - name: Phase 4 - build Coot, chapi & package the tarball
        working-directory: ${{ env.BUILD_DIR }}
        # -branch <ref> makes the script look for coot-<ref> (already checked out here),
        # so it reuses our source instead of cloning upstream.
        run: bash "$GITHUB_WORKSPACE/build-script/dl_and_build_coot.sh"
             ${{ steps.pkgflag.outputs.flag }} -distributable -noninteractive ${{ matrix.flag }}
             -branch '${{ github.ref_name }}' -coot-stage-only

      - name: Upload Coot tarball
        uses: actions/upload-artifact@v7
        with:
          name: coot-rockylinux-${{ matrix.label }}-x86_64
          path: ${{ env.BUILD_DIR }}/coot-*.tar.zst
          if-no-files-found: error
          retention-days: 7

      # ---- Tests: run against the packaged, relocatable tarball -------------------------

      - name: Unpack the tarball into a clean location
        run: |
          mkdir -p "$GITHUB_WORKSPACE/coot-test"
          tar --zstd -xf "$BUILD_DIR"/coot-*.tar.zst -C "$GITHUB_WORKSPACE/coot-test"
          # The tarball unpacks to a single top-level dir; capture it.
          COOT_ROOT="$(find "$GITHUB_WORKSPACE/coot-test" -maxdepth 1 -mindepth 1 -type d | head -n1)"
          echo "COOT_ROOT=$COOT_ROOT" >> "$GITHUB_ENV"
          ls -la "$COOT_ROOT"

      - name: Test - Coot self-test
        run: |
          cd "$COOT_ROOT"
          ./bin/coot-1 --self-test < /dev/null

      - name: Test - chapi (headless Python API) imports
        run: |
          cd "$COOT_ROOT"
          . ./bin/coot-env.sh
          ./bin/python3 -c 'import coot_headless_api as chapi; print("chapi OK:", chapi)'

      - name: Collect build logs on failure
        if: failure()
        working-directory: ${{ env.BUILD_DIR }}
        shell: bash
        run: |
          shopt -s nullglob
          tar --zstd -cf build-logs.tar.zst \
            *.log* {deps,build}/*/*.log* {deps,build}/*/*/*.log* {build,deps}/*.log* \
            "${{ steps.coot.outputs.dir }}"/*.log* "${{ steps.coot.outputs.dir }}"/chapi-build/*.log* || true

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: build-logs-rockylinux-${{ matrix.label }}
          path: ${{ env.BUILD_DIR }}/build-logs.tar.zst
          if-no-files-found: warn
